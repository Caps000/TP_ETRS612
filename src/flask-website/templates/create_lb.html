{% extends 'layout.html' %}
{% block title %}Nouveau LB{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h2 class="fw-bold mb-4 text-center">Ajouter un Load Balancer</h2>
            <form action="{{ url_for('create_lb') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nom du cluster</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Liste des serveurs (Backends)</label>
                    <textarea class="form-control" name="backends" rows="3" placeholder="10.0.0.1:80; 10.0.0.2:80" required></textarea>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <a href="{{ url_for('list_lb') }}" class="btn btn-light border w-50">Annuler</a>
                    <button type="submit" class="btn btn-primary w-50">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
